name: Lint

on:
  push:
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Run Pylint
      uses: MasonData/pylint-github-action@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        path: coastalmodeling_vdatum
