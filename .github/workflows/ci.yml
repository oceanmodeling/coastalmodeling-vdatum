name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install anybadge

      - name: Run Pylint
        run: pylint --fail-under=7.5 coastalmodeling_vdatum > pylint.log || exit 0

      - name: Generate Pylint Badge
        run: anybadge --value=$(tail -n 2 pylint.log | head -n 1 | cut -d ' ' -f 7 | cut -d '/' -f 1) --file=pylint.svg pylint

      - name: Upload Pylint Badge
        uses: actions/upload-artifact@v4
        with:
          name: pylint-badge
          path: pylint.svg

      - name: Run Pytest and Generate Coverage Report
        run: pytest --cov=./ --cov-report=xml

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true

  build_docs:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mkdocs-material "mkdocstrings[python]"
          pip install .

      - name: Build MkDocs site
        run: mkdocs build

      - name: Download Pylint Badge
        uses: actions/download-artifact@v4
        with:
          name: pylint-badge

      - name: Move Pylint Badge
        run: mv pylint-badge.svg site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  deploy:
    needs: [build_docs]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download artifact
        uses: actions/download-pages-artifact@v2
        with:
          name: github-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
